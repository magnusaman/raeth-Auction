services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: raeth
      POSTGRES_PASSWORD: raeth
      POSTGRES_DB: raeth
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raeth"]
      interval: 5s
      timeout: 5s
      retries: 5

  raeth:
    build: .
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=postgresql://raeth:raeth@postgres:5432/raeth
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - ADMIN_SECRET=${ADMIN_SECRET:-raeth-dev-secret-key-min16}
      - PORT=3000
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
